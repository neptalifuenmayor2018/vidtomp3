<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">

<title>VidToMP3 - Convertidor Gratuito</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0a0f;--card:#13131f;--card2:#1a1a2e;--border:#2a2a4a;
  --accent:#7c3aed;--accent2:#4f46e5;--pink:#ec4899;
  --text:#e2e8f0;--muted:#94a3b8;--green:#10b981;
}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh}
.blob{position:fixed;border-radius:50%;filter:blur(90px);opacity:.12;pointer-events:none;z-index:0}
.b1{width:500px;height:500px;background:var(--accent);top:-150px;left:-150px}
.b2{width:400px;height:400px;background:var(--pink);bottom:-100px;right:-100px}
.wrap{position:relative;z-index:1;max-width:700px;margin:0 auto;padding:40px 20px 80px}
header{text-align:center;margin-bottom:40px}
.logo{display:inline-flex;align-items:center;gap:12px;margin-bottom:12px}
.logo-icon{width:54px;height:54px;background:linear-gradient(135deg,var(--accent),var(--pink));border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:26px;box-shadow:0 0 30px rgba(124,58,237,.5)}
.logo-txt{font-size:30px;font-weight:800;background:linear-gradient(135deg,#a78bfa,#f472b6);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
header p{color:var(--muted);font-size:15px}
.badges{display:flex;flex-wrap:wrap;justify-content:center;gap:8px;margin:16px 0 32px}
.badge{background:var(--card2);border:1px solid var(--border);border-radius:20px;padding:5px 14px;font-size:12px;color:var(--muted)}
.card{background:var(--card);border:1px solid var(--border);border-radius:24px;padding:32px;box-shadow:0 25px 60px rgba(0,0,0,.5)}
.inp-wrap{position:relative;margin-bottom:18px}
.inp-wrap input{width:100%;background:var(--card2);border:1.5px solid var(--border);border-radius:14px;padding:17px 50px 17px 52px;color:var(--text);font-size:15px;outline:none;transition:border-color .2s,box-shadow .2s}
.inp-wrap input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(124,58,237,.2)}
.inp-wrap input::placeholder{color:var(--muted)}
.inp-ico{position:absolute;left:17px;top:50%;transform:translateY(-50%);font-size:20px;pointer-events:none}
.inp-clear{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--muted);cursor:pointer;font-size:17px;display:none}
.inp-clear:hover{color:var(--text)}
.ql-wrap{margin-bottom:22px}
.ql-label{font-size:13px;color:var(--muted);display:block;margin-bottom:9px}
.ql-btns{display:flex;gap:8px}
.qb{flex:1;background:var(--card2);border:1.5px solid var(--border);border-radius:10px;padding:9px;color:var(--muted);cursor:pointer;font-size:13px;font-weight:600;transition:all .2s;text-align:center}
.qb.on{background:rgba(124,58,237,.15);border-color:var(--accent);color:#a78bfa}
.qb:hover:not(.on){border-color:#4a4a6a;color:var(--text)}
.go-btn{width:100%;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:14px;padding:17px;color:#fff;font-size:16px;font-weight:700;cursor:pointer;transition:transform .15s,box-shadow .2s;box-shadow:0 8px 25px rgba(124,58,237,.4);display:flex;align-items:center;justify-content:center;gap:10px}
.go-btn:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 12px 35px rgba(124,58,237,.55)}
.go-btn:disabled{opacity:.6;cursor:not-allowed;transform:none!important}
.prog-wrap{display:none;margin-top:22px}
.prog-top{display:flex;justify-content:space-between;font-size:13px;color:var(--muted);margin-bottom:7px}
.prog-bg{height:8px;background:var(--card2);border-radius:10px;overflow:hidden}
.prog-bar{height:100%;background:linear-gradient(90deg,var(--accent),var(--pink));border-radius:10px;width:0%;transition:width .5s ease}
.result{display:none;margin-top:22px}
.result-box{background:rgba(16,185,129,.08);border:1px solid rgba(16,185,129,.3);border-radius:14px;padding:20px;display:flex;align-items:center;gap:16px}
.result-ico{font-size:38px;flex-shrink:0}
.result-info{flex:1;min-width:0}
.result-title{font-weight:700;font-size:15px;margin-bottom:4px}
.result-meta{font-size:12px;color:var(--muted)}
